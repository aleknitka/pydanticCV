jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run Bandit
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Check licenses
        run: |
          uv run pip-licenses --fail-on="GPL-3.0-or-later;GPL-3.0;GPL-2.0" \
            --format=table

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export requirements
        run: uv export --format requirements-txt --no-hashes > requirements.txt

      - name: Run Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements.txt --package-manager=pip

      - name: Safety check
        run: |
          uv run safety check -r requirements.txt
