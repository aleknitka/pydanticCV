name: pull_request_workflow
on: pull_request
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run Bandit
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Check licenses
        run: |
          uv run pip-licenses --fail-on="GPL-3.0-or-later;GPL-3.0;GPL-2.0" \
            --format=markdown

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export requirements
        run: uv export --format requirements-txt --no-hashes > requirements.txt

      - name: Run Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements.txt --package-manager=pip
  pytest:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Actions
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group tests

      - name: Run tests
        run: |
          uv run python -m pytest --cov --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

